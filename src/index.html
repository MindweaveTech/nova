<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="hologram" class="hologram idle">
    <div class="bubble">
      <div class="bubble-shine"></div>
    </div>
  </div>
  <div id="status" class="status-text">NOVA</div>
  <div id="metrics" class="metrics">
    <span id="m-cpu">--</span>
    <span id="m-ram">--</span>
    <span id="m-disk">--</span>
    <span id="m-net">--</span>
  </div>
  <div id="matrix-log" class="matrix-log"></div>
  <div id="transcript" class="transcript"></div>
  <script src="renderer.js"></script>
</body>
</html>
